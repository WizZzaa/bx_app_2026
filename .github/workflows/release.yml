name: Release

# Сборка и публикация дистрибутивов при пуше тега вида v2.0.0.
# Каждая платформа собирает свои артефакты (electron-forge makers
# сами фильтруются по платформе) и публикует их в один GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: npm run typecheck && npm run lint && npm test

      - name: Build & publish
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
