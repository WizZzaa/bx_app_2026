name: Release

# Сборка и публикация дистрибутивов при пуше тега вида v2.0.0.
# Windows-релиз собирается на Windows runner: Squirrel создаёт Setup.exe,
# RELEASES и .nupkg, необходимые для фонового обновления установленной программы.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: npm run typecheck && npm run lint && npm test

  publish-windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows desktop release
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
